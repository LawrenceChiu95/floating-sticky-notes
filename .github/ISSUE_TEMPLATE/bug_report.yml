name: 报告 Bug
description: 报告一个可以稳定复现的问题。
title: "[Bug] "
labels: [缺陷]
body:
  - type: markdown
    attributes:
      value: 提交前请先搜索是否已经存在相同问题。
  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 0.1.9
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - Apple Silicon macOS
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供可以稳定触发问题的最短步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 补充信息
      description: 可以添加截图或日志，但请先移除便签内容和本机路径等隐私信息。
