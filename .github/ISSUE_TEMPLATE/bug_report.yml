name: Bug report
description: Report a reproducible problem in Floating Sticky Notes.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please search existing issues before submitting a new report.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.9
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows 11
        - Windows 10
        - macOS Apple Silicon
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest reliable sequence that triggers the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Additional diagnostics
      description: Add screenshots or logs after removing personal note content and local paths.
