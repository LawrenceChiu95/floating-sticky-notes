name: 持续集成

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 测试与构建
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行测试
        run: npm test

      - name: 构建应用
        run: npm run build

      - name: 审计完整依赖树
        run: npm audit
